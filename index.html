<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣泡排序法教學</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        h1 { color: #2d7dd2; }
        .array-bar {
            display: inline-block;
            margin: 0 2px;
            background: #a2d5f2;
            color: #222;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
            text-align: center;
            vertical-align: bottom;
            transition: background 0.3s;
        }
        .array-bar.active { background: #ffb400; }
        .array-bar.sorted { background: #70c1b3; }
        .controls { margin: 24px 0; }
        button { background: #2d7dd2; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; font-size: 1rem; cursor: pointer; margin-right: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .info { margin-top: 32px; background: #eaf6fb; padding: 20px; border-radius: 8px; }
        .step { margin: 8px 0; }
        .complexity { margin-top: 16px; font-size: 1.1em; }
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .array-bar { width: 18px; font-size: 0.8em; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>氣泡排序法（Bubble Sort）教學</h1>
    <div id="array-container" style="height: 180px; margin-bottom: 20px;"></div>
    <div class="controls">
        <button id="start-btn">開始排序</button>
        <button id="reset-btn">重設陣列</button>
    </div>
    <div id="steps" class="info"></div>
    <div class="info">
        <h2>氣泡排序法原理</h2>
        <p>氣泡排序法是一種簡單的排序演算法。它會重複地走訪待排序的資料列，依序比較相鄰的兩個元素，若順序錯誤則交換，直到整個資料列有序為止。</p>
        <h3>操作步驟</h3>
        <ol>
            <li>從頭到尾依序比較相鄰的兩個元素。</li>
            <li>如果前一個元素比後一個大，則交換它們。</li>
            <li>每一輪結束後，最大的元素會被移到最右邊。</li>
            <li>重複上述步驟，直到沒有需要交換的元素。</li>
        </ol>
        <div class="complexity">
            <strong>時間複雜度：</strong> 最壞/平均 $O(n^2)$，最佳 $O(n)$（已排序時）<br>
            <strong>空間複雜度：</strong> $O(1)$
        </div>
    </div>
</div>
<script>
const arrayContainer = document.getElementById('array-container');
const stepsDiv = document.getElementById('steps');
const startBtn = document.getElementById('start-btn');
const resetBtn = document.getElementById('reset-btn');

let array = [];
let sorting = false;

function randomArray(size = 8, min = 10, max = 99) {
    return Array.from({length: size}, () => Math.floor(Math.random() * (max - min + 1)) + min);
}

function renderArray(activeIndices = [], sortedIndex = null) {
    arrayContainer.innerHTML = '';
    array.forEach((num, i) => {
        const bar = document.createElement('div');
        bar.className = 'array-bar';
        bar.style.height = (num * 2) + 'px';
        bar.style.width = '36px';
        bar.textContent = num;
        if (activeIndices.includes(i)) bar.classList.add('active');
        if (sortedIndex !== null && i >= sortedIndex) bar.classList.add('sorted');
        arrayContainer.appendChild(bar);
    });
}

function logStep(text) {
    const step = document.createElement('div');
    step.className = 'step';
    step.innerHTML = text;
    stepsDiv.appendChild(step);
    stepsDiv.scrollTop = stepsDiv.scrollHeight;
}

function resetSteps() {
    stepsDiv.innerHTML = '<strong>排序步驟：</strong>';
}

async function bubbleSort() {
    sorting = true;
    startBtn.disabled = true;
    resetBtn.disabled = true;
    resetSteps();
    let n = array.length;
    let swapped;
    for (let i = 0; i < n - 1; i++) {
        swapped = false;
        for (let j = 0; j < n - i - 1; j++) {
            renderArray([j, j+1], n - i);
            logStep(`比較 <b>${array[j]}</b> 和 <b>${array[j+1]}</b>`);
            await sleep(600);
            if (array[j] > array[j+1]) {
                logStep(`交換 <b>${array[j]}</b> 和 <b>${array[j+1]}</b>`);
                [array[j], array[j+1]] = [array[j+1], array[j]];
                swapped = true;
                renderArray([j, j+1], n - i);
                await sleep(600);
            }
        }
        renderArray([], n - i - 1);
        if (!swapped) {
            logStep('本輪無交換，排序完成！');
            break;
        }
    }
    renderArray([], 0);
    logStep('<b>排序結束！</b>');
    sorting = false;
    startBtn.disabled = false;
    resetBtn.disabled = false;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function resetArray() {
    array = randomArray();
    renderArray();
    resetSteps();
}

startBtn.onclick = () => {
    if (!sorting) bubbleSort();
};
resetBtn.onclick = () => {
    if (!sorting) resetArray();
};

// 初始化
resetArray();
</script>
</body>
</html>
