<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演算法教學中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #1a2332 0%, #1e3a52 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: linear-gradient(135deg, #2d3e52 0%, #1a2d42 100%);
            border-radius: 15px; 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 30px rgba(70, 150, 200, 0.2);
            padding: 40px; 
            border: 2px solid rgba(100, 150, 200, 0.4);
            text-align: center;
        }
        
        h1 { 
            color: #ffffff; 
            font-size: 2.2em;
            text-shadow: 0 0 20px rgba(79, 195, 247, 0.5), 0 0 40px rgba(79, 195, 247, 0.2);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .subtitle {
            color: #b3e5fc;
            font-size: 1.1em;
            margin-bottom: 40px;
            font-weight: 400;
        }
        
        .algorithms {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        .algo-card {
            background: rgba(79, 195, 247, 0.1);
            border-radius: 10px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.2);
            cursor: pointer;
            display: block;
            border: 2px solid rgba(79, 195, 247, 0.3);
        }
        
        .algo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(79, 195, 247, 0.4);
            border-color: rgba(79, 195, 247, 0.6);
            background: rgba(79, 195, 247, 0.15);
        }
        
        .algo-card h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
            font-weight: 700;
            color: #4fc3f7;
            text-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
        }
        
        .algo-card p {
            font-size: 1em;
            line-height: 1.6;
            opacity: 0.95;
            color: #ffffff;
        }
        
        .algo-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        footer {
            margin-top: 40px;
            color: #b3e5fc;
            font-size: 0.9em;
            border-top: 1px solid rgba(79, 195, 247, 0.2);
            padding-top: 20px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .algo-card h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>演算法教學中心</h1>
        <p class="subtitle">學習基礎排序演算法</p>
        
        <div class="algorithms">
            <a href="bubble_sort.html" class="algo-card">
                <div class="algo-icon">🫧</div>
                <h2>氣泡排序法</h2>
                <p>Bubble Sort - 學習最基礎的排序演算法，通過相鄰元素交換實現排序</p>
            </a>
            <a href="selection_sort.html" class="algo-card">
                <div class="algo-icon">🎯</div>
                <h2>選擇排序法</h2>
                <p>Selection Sort - 學習選擇排序演算法，每次選擇最小元素進行排序</p>
            </a>
            <a href="insertion_sort.html" class="algo-card">
                <div class="algo-icon">📥</div>
                <h2>插入排序法</h2>
                <p>Insertion Sort - 學習插入排序演算法，將元素逐個插入已排序的序列中</p>
            </a>
            <a href="merge_sort.html" class="algo-card">
                <div class="algo-icon">🔀</div>
                <h2>合併排序法</h2>
                <p>Merge Sort - 學習合併排序演算法，使用分治法高效排序序列</p>
            </a>
            <a href="quick_sort.html" class="algo-card">
                <div class="algo-icon">⚡</div>
                <h2>快速排序法</h2>
                <p>Quick Sort - 學習快速排序演算法，採用分治策略高效排序序列</p>
            </a>
        </div>
        
        <footer>
            <p>💡 提示：點擊上方卡片進入相應的演算法教學頁面</p>
        </footer>
    </div>
</body>
</html>
