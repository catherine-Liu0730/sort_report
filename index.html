<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演算法教學中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px;
            text-align: center;
        }
        
        h1 {
            color: #2d3436;
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #636e72;
            font-size: 1.1em;
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        .algorithms {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        .algo-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            display: block;
        }
        
        .algo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }
        
        .algo-card h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .algo-card p {
            font-size: 1em;
            line-height: 1.6;
            opacity: 0.95;
        }
        
        .algo-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        footer {
            margin-top: 40px;
            color: #636e72;
            font-size: 0.9em;
            border-top: 1px solid #dfe6e9;
            padding-top: 20px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .algo-card h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>演算法教學中心</h1>
        <p class="subtitle">學習基礎排序演算法</p>
        
        <div class="algorithms">
            <a href="bubble_sort.html" class="algo-card">
                <div class="algo-icon">🫧</div>
                <h2>氣泡排序法</h2>
                <p>Bubble Sort - 學習最基礎的排序演算法，通過相鄰元素交換實現排序</p>
            </a>
        </div>
        
        <footer>
            <p>💡 提示：點擊上方卡片進入相應的演算法教學頁面</p>
        </footer>
    </div>
</body>
</html>
